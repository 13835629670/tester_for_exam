<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>刷题记忆工具</title>
  <link rel="stylesheet" href="./styles.css?v=20260701-exam-entries">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">T</span>
        <div>
          <h1>刷题记忆工具</h1>
          <p>多题型、错题复习</p>
        </div>
      </div>

      <section class="panel">
        <div class="panel-head">
          <h2>科目</h2>
          <span id="subjectCount" class="muted">0 个</span>
        </div>
        <div class="create-row">
          <input id="subjectInput" type="text" placeholder="新科目名称">
          <button id="addSubjectBtn" type="button">添加</button>
        </div>
        <div id="subjectList" class="subject-list" aria-label="科目列表"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>导入题库</h2>
          <span class="muted">docx / doc / pdf</span>
        </div>
        <label class="upload-box">
          <input id="fileInput" type="file" multiple accept=".docx,.doc,.pdf">
          <span>选择文件</span>
          <small>支持单选、多选、判断、填空、简答题库</small>
        </label>
        <p id="serverHint" class="server-hint"></p>
        <div id="importLog" class="import-log"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>已导入文件</h2>
          <span id="importedCount" class="muted">0 个</span>
        </div>
        <div id="importedList" class="imported-list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>数据缓存</h2>
          <span class="muted">JSON</span>
        </div>
        <div class="create-row">
          <button id="exportCacheBtn" type="button">导出缓存</button>
          <button id="importCacheBtn" type="button">导入缓存</button>
          <input id="importCacheInput" type="file" accept=".json" hidden>
        </div>
      </section>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">当前科目</p>
          <h2 id="activeSubjectName">未选择</h2>
        </div>
        <div id="stats" class="stats"></div>
      </header>

      <nav class="tabs" aria-label="功能">
        <button class="tab active" type="button" data-view="practice">练习</button>
        <button class="tab" type="button" data-view="exam">模拟组卷</button>
        <button class="tab" type="button" data-view="wrong">错题本</button>
        <button class="tab" type="button" data-view="preview">全部预览</button>
      </nav>

      <section id="emptyState" class="empty-state">
        <h2>先创建科目，再上传题库</h2>
        <p>支持从 docx / doc / pdf 中识别单选、多选、判断、填空和简答题。</p>
      </section>

      <section id="practiceView" class="view active">
        <div class="toolbar">
          <div class="segmented">
            <button class="active" type="button" data-practice-mode="all">全部</button>
            <button type="button" data-practice-mode="single">单选</button>
            <button type="button" data-practice-mode="multi">多选</button>
            <button type="button" data-practice-mode="judge">判断</button>
            <button type="button" data-practice-mode="blank">填空</button>
            <button type="button" data-practice-mode="short">简答</button>
          </div>
          <div class="toolbar-actions">
            <input id="jumpInput" type="number" min="1" placeholder="题号" aria-label="跳转题号">
            <button id="jumpBtn" type="button">跳题</button>
            <button id="clearProgressBtn" type="button">清除进度</button>
            <button id="shufflePracticeBtn" type="button">乱序练习</button>
            <button id="resetPracticeBtn" type="button">顺序练习</button>
          </div>
        </div>
        <div id="practiceArea" class="content-area"></div>
      </section>

      <section id="wrongView" class="view">
        <div class="toolbar">
          <h3>错题本</h3>
          <button id="clearWrongBtn" type="button">清空错题</button>
        </div>
        <div id="wrongArea" class="content-area"></div>
      </section>

      <section id="examView" class="view">
        <div class="toolbar">
          <div>
            <h3>模拟组卷</h3>
            <p class="exam-note">备注：客观题可不选视为 0 分，填空和简答只展示参考答案。</p>
            <div id="examSummary" class="exam-summary"></div>
          </div>
          <div class="toolbar-actions">
            <button id="submitExamBtn" type="button">交卷算分</button>
          </div>
        </div>
        <div class="exam-entry-grid">
          <div class="exam-builder">
            <h3>单片机模拟考试（固定策略）</h3>
            <p class="exam-note">按原组卷策略生成：选择题 36 题 54 分，判断题 16 题 16 分，满分 70 分。</p>
            <div class="exam-builder-actions">
              <button id="generateExamBtn" type="button">生成单片机固定卷</button>
            </div>
          </div>
          <div class="exam-builder">
            <h3>自定义模拟组卷</h3>
            <p class="exam-note">数量留空表示该题型全选；填空和简答只展示参考答案，不计入分数。</p>
            <div class="exam-builder-grid">
              <label>单选<input id="genericSingleCount" type="number" min="0" placeholder="全部"></label>
              <label>多选<input id="genericMultiCount" type="number" min="0" placeholder="全部"></label>
              <label>判断<input id="genericJudgeCount" type="number" min="0" placeholder="全部"></label>
              <label>填空<input id="genericBlankCount" type="number" min="0" placeholder="全部"></label>
              <label>简答<input id="genericShortCount" type="number" min="0" placeholder="全部"></label>
              <button id="generateGenericExamBtn" type="button">生成自定义卷</button>
            </div>
          </div>
        </div>
        <div id="examArea" class="content-area"></div>
      </section>

      <section id="previewView" class="view">
        <div class="toolbar">
          <h3>全部预览</h3>
          <div class="segmented">
            <button class="active" type="button" data-preview-filter="all">全部</button>
            <button type="button" data-preview-filter="single">单选</button>
            <button type="button" data-preview-filter="multi">多选</button>
            <button type="button" data-preview-filter="judge">判断</button>
            <button type="button" data-preview-filter="blank">填空</button>
            <button type="button" data-preview-filter="short">简答</button>
          </div>
        </div>
        <div id="previewArea" class="content-area"></div>
      </section>
    </section>
  </main>

  <template id="questionTemplate">
    <article class="question-card">
      <div class="question-meta"></div>
      <h3></h3>
      <div class="options"></div>
      <div class="answer-panel"></div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script src="./app.js?v=20260701-exam-entries" defer></script>
</body>
</html>
